name: CI & Production Release Pipeline

on:
  push:
    branches: [ main, master ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ main, master ]

jobs:
  test:
    name: Run Test Suite
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Source Code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.11"
        cache: 'pip'

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        python -m pip install -e .[dev]

    - name: Run Pytest
      run: |
        python -m pytest --cov=folder_sorter --cov-report=xml tests/

  build-windows:
    name: Build Windows Binary
    needs: test
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: windows-latest
    timeout-minutes: 20
    steps:
    - name: Checkout Source Code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.11"

    - name: Set Version Tag
      shell: bash
      run: |
        TAG_VERSION="${GITHUB_REF_NAME#v}"
        echo "Tag Version: $TAG_VERSION"
        python -c "import re; content = open('folder_sorter/main.py').read(); content = re.sub(r'__version__ = \".*?\"', f'__version__ = \"$TAG_VERSION\"', content); open('folder_sorter/main.py', 'w').write(content)"
        python -c "import re; content = open('pyproject.toml').read(); content = re.sub(r'version = \".*?\"', f'version = \"$TAG_VERSION\"', content); open('pyproject.toml', 'w').write(content)"

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        python -m pip install pyinstaller
        python -m pip install .

    - name: Build Executable
      run: |
        pyinstaller --onefile --name folder-sorter folder_sorter/main.py

    - name: Package Windows Binary
      shell: bash
      run: |
        cd dist
        powershell Compress-Archive -Path folder-sorter.exe -DestinationPath folder-sorter-windows.zip

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: windows-binary
        path: dist/folder-sorter-windows.zip

