  publish-release:
    name: Create GitHub Release
    needs: [build-windows]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
    - name: Checkout Source Code
      uses: actions/checkout@v4

    - name: Download All Artifacts
      uses: actions/download-artifact@v4
      with:
        path: temp_artifacts

    - name: Organize Release Assets
      run: |
        mkdir -p release_assets
        if [ -d temp_artifacts ]; then
          find temp_artifacts -type f -exec cp {} release_assets/ \;
        fi
        cp CHANGELOG.md release_assets/CHANGELOG.md
        cp CHANGELOG.md release_assets/CHANGELOG
        echo "Contents of release_assets:"
        ls -la release_assets/

    - name: Generate SHA256 Checksums
      run: |
        cd release_assets
        shopt -s nullglob
        files=(folder-sorter-*)
        if [ ${#files[@]} -gt 0 ]; then
          sha256sum "${files[@]}" > sha256sums.txt
        else
          echo "No binaries found to checksum."
          touch sha256sums.txt
        fi

    - name: Create Release and Upload Assets
      uses: softprops/action-gh-release@v2
      with:
        files: |
          release_assets/*
        generate_release_notes: true

